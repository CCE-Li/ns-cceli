server {
    listen 80;  # 监听端口（HTTP 默认 80，HTTPS 用 443）
    server_name ns.cceli.icu;  # 绑定的域名

    # 网站根目录和默认首页
    root /home/lyx/nginx/www/ns-cceli;  # 静态文件所在目录
    index index.html index.htm;  # 默认首页（优先级：index.html > index.htm）

    # location 块：匹配 URL 路径，配置请求处理规则
    location / {
        # 解决 Vue/React 单页应用（SPA）刷新 404 问题
        try_files $uri $uri/ /index.html;
        # 允许跨域（可选，若前端需调用后端接口）
        add_header Access-Control-Allow-Origin *;
    }

    # 静态资源缓存配置（优化性能，可选）
    location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg)$ {
        expires 30d;  # 缓存 30 天（减少重复请求）
        add_header Cache-Control "public, max-age=2592000";
    }

    # 禁止访问隐藏文件（如 .git、.env，安全优化）
    location ~ /\. {
        deny all;  # 拒绝所有请求
        access_log off;
        log_not_found off;
    }

    # Gzip 压缩配置（提高传输效率）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
}

