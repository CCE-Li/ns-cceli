server {
    listen 1400;
    server_name ns.cceli.icu www.ns.cceli.icu _;  # 支持域名和 IP 访问

    # 网站根目录和默认首页
    root /home/lyx/nginx/www/ns-cceli;
    index index.html index.htm;

    # 记录访问日志（便于调试）
    access_log /var/log/nginx/ns-cceli-access.log;
    error_log /var/log/nginx/ns-cceli-error.log;

    # location 块：匹配 URL 路径，配置请求处理规则
    location / {
        # 解决 Vue/React 单页应用（SPA）刷新 404 问题
        try_files $uri $uri/ /index.html;
        # 允许跨域（可选，若前端需调用后端接口）
        add_header Access-Control-Allow-Origin *;
        
        # 添加调试头（可选）
        add_header X-Server-Name $host;
        add_header X-Real-IP $remote_addr;
    }

    # 静态资源缓存配置（优化性能，可选）
    location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # 禁止访问隐藏文件（如 .git、.env，安全优化）
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 健康检查端点（可选）
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Gzip 压缩配置（提高传输效率）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
}

# 默认配置（捕获所有其他请求）
server {
    listen 1400 default_server;
    server_name _;
    
    # 重定向到主站点（可选）
    # return 301 http://ns.cceli.icu:1400$request_uri;
    
    # 或者显示简单的默认页面
    return 200 "Nginx is running on port 1400\nUse ns.cceli.icu:1400 to access the application\n";
    add_header Content-Type text/plain;
}
